      <text x="688" y="14" class="lang-bytes">216.3K</text>
    </g>
  
    <g transform="translate(0, 90)">
      <text x="0" y="14" class="lang-name">Python</text>
      <rect x="184" y="4" width="412" height="12" rx="6" class="track" />
      <rect x="184" y="4" width="6" height="12" rx="6" fill="#f59e0b" />
      <text x="610" y="14" class="lang-meta">0.4%</text>
      <text x="688" y="14" class="lang-bytes">143.9K</text>
