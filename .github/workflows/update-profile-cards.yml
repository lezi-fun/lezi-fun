name: Update profile cards

on:
  workflow_dispatch:
  schedule:
    - cron: '17 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate cards
        env:
          GITHUB_USER: lezi-fun
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-profile-cards.mjs

      - name: Commit cards
        run: |
          if git diff --quiet -- profile; then
            echo "No card updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile
          git commit -m "chore: update profile cards"
          git push
