name: Update profile cards

on:
  workflow_dispatch:
  schedule:
    - cron: '17 0 * * *'

permissions:
  contents: write

concurrency:
  group: update-profile-cards-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate and push cards
        env:
          GITHUB_USER: lezi-fun
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin "$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"

            node scripts/generate-profile-cards.mjs

            if git diff --quiet -- profile; then
              echo "No card updates."
              exit 0
            fi

            git add profile
            git commit -m "chore: update profile cards"

            if git push origin "HEAD:$BRANCH_NAME"; then
              echo "Profile cards updated successfully."
              exit 0
            fi

            echo "Push failed on attempt $attempt, retrying on top of latest remote..."
            git reset --hard "origin/$BRANCH_NAME"
          done

          echo "Failed to push profile cards after 3 attempts."
          exit 1
